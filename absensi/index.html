<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(218, 165, 32, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(184, 134, 11, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .header p {
            color: #888;
            font-size: 16px;
            font-weight: 400;
        }

        .nav-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(218, 165, 32, 0.1);
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            padding: 16px 24px;
            background: transparent;
            color: #888;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .tab-btn:hover {
            color: #DAA520;
        }

        .tab-btn.active {
            color: #000;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%);
            box-shadow: 0 8px 32px rgba(218, 165, 32, 0.3);
        }

        .tab-btn.active::before {
            opacity: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 28px;
        }

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(218, 165, 32, 0.15);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(218, 165, 32, 0.3);
            box-shadow: 0 8px 32px rgba(218, 165, 32, 0.1);
        }

        .card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #DAA520;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, #DAA520 0%, #B8860B 100%);
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #bbb;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(218, 165, 32, 0.2);
            border-radius: 12px;
            color: #e8e8e8;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #DAA520;
            background: rgba(218, 165, 32, 0.08);
            box-shadow: 0 0 0 4px rgba(218, 165, 32, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 16px 28px;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(218, 165, 32, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .student-list {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .student-item {
            background: rgba(218, 165, 32, 0.05);
            border: 1px solid rgba(218, 165, 32, 0.15);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .student-item:hover {
            background: rgba(218, 165, 32, 0.1);
            border-color: rgba(218, 165, 32, 0.3);
            transform: translateX(6px);
        }

        .student-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #FFD700;
            margin-bottom: 6px;
        }

        .student-info p {
            font-size: 14px;
            color: #888;
        }

        .btn-delete {
            padding: 10px 20px;
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: rgba(220, 38, 38, 0.3);
            border-color: #ff6b6b;
        }

        .attendance-form {
            background: rgba(218, 165, 32, 0.03);
            border: 1px solid rgba(218, 165, 32, 0.2);
            padding: 28px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .attendance-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .attendance-card {
            background: rgba(218, 165, 32, 0.05);
            border: 1px solid rgba(218, 165, 32, 0.15);
            padding: 24px;
            border-radius: 14px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .attendance-card:hover {
            border-color: rgba(218, 165, 32, 0.3);
            background: rgba(218, 165, 32, 0.08);
        }

        .attendance-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .attendance-student {
            font-size: 20px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 8px;
        }

        .attendance-meta {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
        }

        .attendance-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            background: rgba(218, 165, 32, 0.15);
            color: #DAA520;
            border: 1px solid rgba(218, 165, 32, 0.3);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            background: rgba(218, 165, 32, 0.25);
        }

        .attendance-note {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 10px;
            border-left: 3px solid #DAA520;
            color: #bbb;
            font-size: 14px;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(218, 165, 32, 0.15) 0%, rgba(184, 134, 11, 0.1) 100%);
            border: 1px solid rgba(218, 165, 32, 0.3);
            padding: 28px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(218, 165, 32, 0.2);
        }

        .stat-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .report-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 24px;
            overflow: hidden;
            border-radius: 12px;
        }

        .report-table thead tr {
            background: rgba(218, 165, 32, 0.15);
        }

        .report-table th {
            padding: 16px;
            text-align: left;
            font-size: 12px;
            color: #DAA520;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(218, 165, 32, 0.3);
        }

        .report-table td {
            padding: 18px 16px;
            border-bottom: 1px solid rgba(218, 165, 32, 0.1);
            font-size: 14px;
            color: #ccc;
        }

        .report-table tbody tr {
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .report-table tbody tr:hover {
            background: rgba(218, 165, 32, 0.08);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        .empty-state::before {
            content: '📊';
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .filter-section {
            background: rgba(218, 165, 32, 0.05);
            padding: 24px;
            border-radius: 14px;
            margin-bottom: 28px;
            border: 1px solid rgba(218, 165, 32, 0.15);
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(218, 165, 32, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(218, 165, 32, 0.5);
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%);
            color: #000;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(218, 165, 32, 0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <div class="header">
            <h1>Attendance Tracker</h1>
            <p>Sistem pencatatan kehadiran murid yang modern dan efisien</p>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('students')">Data Murid</button>
            <button class="tab-btn" onclick="switchTab('attendance')">Catat Kehadiran</button>
            <button class="tab-btn" onclick="switchTab('report')">Laporan</button>
        </div>

        <!-- Tab: Data Murid -->
        <div id="students-tab" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h2>Tambah Murid</h2>
                    <form id="studentForm">
                        <div class="form-group">
                            <label>Nama Murid</label>
                            <input type="text" id="studentName" required placeholder="Masukkan nama murid">
                        </div>
                        <div class="form-group">
                            <label>Mata Pelajaran</label>
                            <input type="text" id="subject" required placeholder="Contoh: Matematika, Bahasa Inggris">
                        </div>
                        <button type="submit" class="btn">Tambah Murid</button>
                    </form>
                </div>

                <div class="card">
                    <h2>Daftar Murid</h2>
                    <div class="student-list" id="studentList"></div>
                </div>
            </div>
        </div>

        <!-- Tab: Catat Kehadiran -->
        <div id="attendance-tab" class="tab-content">
            <div class="card">
                <h2>Catat Kehadiran Baru</h2>
                
                <form id="attendanceForm" class="attendance-form">
                    <div class="form-group">
                        <label>Pilih Murid</label>
                        <select id="attendanceStudent" required>
                            <option value="">-- Pilih Murid --</option>
                        </select>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tanggal</label>
                            <input type="date" id="attendanceDate" required>
                        </div>
                        <div class="form-group">
                            <label>Jam</label>
                            <input type="time" id="attendanceTime" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Catatan (Opsional)</label>
                        <textarea id="attendanceNote" placeholder="Tambahkan catatan jika ada..."></textarea>
                    </div>

                    <button type="submit" class="btn">Simpan Kehadiran</button>
                </form>

                <h2 style="margin-top: 40px;">Riwayat Kehadiran</h2>
                <div class="attendance-list" id="attendanceList"></div>
            </div>
        </div>

        <!-- Tab: Laporan -->
        <div id="report-tab" class="tab-content">
            <div class="card">
                <h2>Laporan Kehadiran</h2>
                
                <div class="filter-section">
                    <div class="filter-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Filter Tanggal</label>
                            <input type="date" id="filterDate" onchange="loadReport()">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Filter Murid</label>
                            <select id="filterStudent" onchange="loadReport()">
                                <option value="">Semua Murid</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Filter Pelajaran</label>
                            <select id="filterSubject" onchange="loadReport()">
                                <option value="">Semua Pelajaran</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="stats-grid" id="statsGrid"></div>
                <div id="reportContent"></div>
            </div>
        </div>
    </div>

    <script>
        let students = [];
        let attendanceRecords = [];

        // Load data
        async function loadData() {
            try {
                const studentsResult = await window.storage.get('students');
                if (studentsResult) {
                    students = JSON.parse(studentsResult.value);
                }
            } catch (e) {
                students = [];
            }

            try {
                const attendanceResult = await window.storage.get('attendance');
                if (attendanceResult) {
                    attendanceRecords = JSON.parse(attendanceResult.value);
                }
            } catch (e) {
                attendanceRecords = [];
            }

            renderStudentList();
            updateStudentSelects();
            renderAttendanceList();
            loadReport();
        }

        // Save data
        async function saveData() {
            try {
                await window.storage.set('students', JSON.stringify(students));
                await window.storage.set('attendance', JSON.stringify(attendanceRecords));
            } catch (error) {
                console.error('Error saving:', error);
            }
        }

        // Add student
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const student = {
                id: Date.now(),
                name: document.getElementById('studentName').value,
                subject: document.getElementById('subject').value
            };

            students.push(student);
            await saveData();
            renderStudentList();
            updateStudentSelects();
            showMessage('Murid berhasil ditambahkan!');
            this.reset();
        });

        // Render student list
        function renderStudentList() {
            const container = document.getElementById('studentList');
            
            if (students.length === 0) {
                container.innerHTML = '<div class="empty-state">Belum ada murid terdaftar</div>';
                return;
            }

            container.innerHTML = students.map(student => `
                <div class="student-item">
                    <div class="student-info">
                        <h3>${student.name}</h3>
                        <p>${student.subject}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteStudent(${student.id})">Hapus</button>
                </div>
            `).join('');
        }

        // Delete student
        async function deleteStudent(id) {
            if (confirm('Yakin ingin menghapus murid ini?')) {
                students = students.filter(s => s.id !== id);
                await saveData();
                renderStudentList();
                updateStudentSelects();
                showMessage('Murid berhasil dihapus!');
            }
        }

        // Update student selects
        function updateStudentSelects() {
            const selects = ['attendanceStudent', 'filterStudent'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                const currentValue = select.value;
                
                if (selectId === 'attendanceStudent') {
                    select.innerHTML = '<option value="">-- Pilih Murid --</option>';
                } else {
                    select.innerHTML = '<option value="">Semua Murid</option>';
                }
                
                students.forEach(student => {
                    select.innerHTML += `<option value="${student.id}">${student.name} - ${student.subject}</option>`;
                });
                
                select.value = currentValue;
            });

            // Update subject filter
            const subjects = [...new Set(students.map(s => s.subject))];
            const subjectSelect = document.getElementById('filterSubject');
            subjectSelect.innerHTML = '<option value="">Semua Pelajaran</option>';
            subjects.forEach(subject => {
                subjectSelect.innerHTML += `<option value="${subject}">${subject}</option>`;
            });
        }

        // Set default date and time
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().slice(0, 5);
            
            document.getElementById('attendanceDate').value = dateStr;
            document.getElementById('attendanceTime').value = timeStr;
        });

        // Add attendance
        document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const attendance = {
                id: Date.now(),
                studentId: parseInt(document.getElementById('attendanceStudent').value),
                date: document.getElementById('attendanceDate').value,
                time: document.getElementById('attendanceTime').value,
                note: document.getElementById('attendanceNote').value,
                timestamp: new Date().toISOString()
            };

            attendanceRecords.unshift(attendance);
            await saveData();
            renderAttendanceList();
            loadReport();
            showMessage('Kehadiran berhasil dicatat!');
            
            // Reset form but keep date and time
            const dateVal = document.getElementById('attendanceDate').value;
            const timeVal = document.getElementById('attendanceTime').value;
            this.reset();
            document.getElementById('attendanceDate').value = dateVal;
            document.getElementById('attendanceTime').value = timeVal;
        });

        // Render attendance list
        function renderAttendanceList() {
            const container = document.getElementById('attendanceList');
            
            if (attendanceRecords.length === 0) {
                container.innerHTML = '<div class="empty-state">Belum ada catatan kehadiran</div>';
                return;
            }

            container.innerHTML = attendanceRecords.map(record => {
                const student = students.find(s => s.id === record.studentId);
                if (!student) return '';
                
                const date = new Date(record.date).toLocaleDateString('id-ID', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                return `
                    <div class="attendance-card">
                        <div class="attendance-header">
                            <div>
                                <div class="attendance-student">${student.name}</div>
                                <div class="attendance-meta">
                                    📚 ${student.subject}<br>
                                    📅 ${date}<br>
                                    🕐 ${record.time}
                                </div>
                            </div>
                            <div class="attendance-actions">
                                <button class="btn-small btn-delete" onclick="deleteAttendance(${record.id})">Hapus</button>
                            </div>
                        </div>
                        ${record.note ? `<div class="attendance-note">${record.note}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Delete attendance
        async function deleteAttendance(id) {
            if (confirm('Yakin ingin menghapus catatan ini?')) {
                attendanceRecords = attendanceRecords.filter(a => a.id !== id);
                await saveData();
                renderAttendanceList();
                loadReport();
                showMessage('Catatan kehadiran dihapus!');
            }
        }

        // Load report
        function loadReport() {
            const filterDate = document.getElementById('filterDate').value;
            const filterStudentId = document.getElementById('filterStudent').value;
            const filterSubjectName = document.getElementById('filterSubject').value;

            let filtered = attendanceRecords;

            if (filterDate) {
                filtered = filtered.filter(r => r.date === filterDate);
            }

            if (filterStudentId) {
                filtered = filtered.filter(r => r.studentId === parseInt(filterStudentId));
            }

            if (filterSubjectName) {
                filtered = filtered.filter(r => {
                    const student = students.find(s => s.id === r.studentId);
                    return student && student.subject === filterSubjectName;
                });
            }

            // Stats
            const totalRecords = filtered.length;
            const uniqueStudents = new Set(filtered.map(r => r.studentId)).size;
            const uniqueDays = new Set(filtered.map(r => r.date)).size;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalRecords}</div>
                    <div class="stat-label">Total Kehadiran</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueStudents}</div>
                    <div class="stat-label">Murid Aktif</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueDays}</div>
                    <div class="stat-label">Hari Tercatat</div>
                </div>
            `;

            // Table
            if (filtered.length === 0) {
                document.getElementById('reportContent').innerHTML = '<div class="empty-state">Tidak ada data yang sesuai filter</div>';
                return;
            }

            const tableHTML = `
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Jam</th>
                            <th>Nama Murid</th>
                            <th>Pelajaran</th>
                            <th>Catatan</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(record => {
                            const student = students.find(s => s.id === record.studentId);
                            if (!student) return '';
                            
                            const date = new Date(record.date).toLocaleDateString('id-ID', { 
                                day: '2-digit',
                                month: 'short',
                                year: 'numeric'
                            });

                            return `
                                <tr>
                                    <td>${date}</td>
                                    <td>${record.time}</td>
                                    <td>${student.name}</td>
                                    <td>${student.subject}</td>
                                    <td>${record.note || '-'}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('reportContent').innerHTML = tableHTML;
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');

            if (tab === 'report') {
                loadReport();
            }
        }

        // Show message
        function showMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'success-message';
            msg.textContent = text;
            document.body.appendChild(msg);
            
            setTimeout(() => {
                msg.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => msg.remove(), 300);
            }, 2500);
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
