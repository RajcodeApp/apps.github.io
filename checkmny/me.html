<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Personal Finance Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 400px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            z-index: -1;
            opacity: 0.1;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-link:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-toggle:hover {
            background: var(--bg-secondary);
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px var(--shadow);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: var(--primary);
            opacity: 0.1;
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-change {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        .transaction-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            background: var(--bg-secondary);
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .transaction-details h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .transaction-details p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 16px;
        }

        .transaction-amount.income {
            color: var(--success);
        }

        .transaction-amount.expense {
            color: var(--danger);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 999px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 999px;
            transition: width 0.5s ease;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 5px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        select.form-input {
            cursor: pointer;
        }

        .wallet-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .wallet-name {
            font-size: 16px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .wallet-balance {
            font-size: 28px;
            font-weight: 700;
        }

        .goal-card {
            margin-bottom: 20px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .goal-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .goal-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .goal-amount {
            text-align: right;
        }

        .goal-current {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .goal-target {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .health-score {
            text-align: center;
            padding: 30px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        .score-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 700;
        }

        .score-label {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .score-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
        }

        .score-status.healthy {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .score-status.moderate {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .score-status.poor {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .insight-card {
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .insight-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }

        .insight-text {
            font-size: 14px;
            line-height: 1.6;
        }

        .spinner {
            border: 3px solid var(--bg-secondary);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .search-filter {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
        }

        .category-food { background: #fef3c7; color: #f59e0b; }
        .category-transport { background: #dbeafe; color: #3b82f6; }
        .category-bills { background: #fee2e2; color: #ef4444; }
        .category-shopping { background: #fce7f3; color: #ec4899; }
        .category-health { background: #dcfce7; color: #22c55e; }
        .category-entertainment { background: #e0e7ff; color: #6366f1; }
        .category-salary { background: #d1fae5; color: #10b981; }
        .category-freelance { background: #ddd6fe; color: #8b5cf6; }
        .category-investment { background: #ccfbf1; color: #14b8a6; }
        .category-education { background: #fce7f3; color: #ec4899; }
        .category-others { background: #e5e7eb; color: #6b7280; }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .networth-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .networth-item {
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .networth-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .networth-value {
            font-size: 20px;
            font-weight: 700;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
        }

        /* NEW: Filter Pills */
        .filter-pills {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 8px 16px;
            border-radius: 999px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-pill:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* NEW: Summary Box */
        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 20px;
            font-weight: 700;
        }

        .summary-value.income {
            color: var(--success);
        }

        .summary-value.expense {
            color: var(--danger);
        }

        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-range input {
            flex: 1;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">₿</div>
                <div class="logo-text">FinTrack</div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" data-page="dashboard">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text" data-i18n="nav.dashboard">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="transactions">
                        <span class="nav-icon">💳</span>
                        <span class="nav-text" data-i18n="nav.transactions">Transactions</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="wallets">
                        <span class="nav-icon">👛</span>
                        <span class="nav-text" data-i18n="nav.wallets">Wallets</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="goals">
                        <span class="nav-icon">🎯</span>
                        <span class="nav-text" data-i18n="nav.goals">Goals</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="budget">
                        <span class="nav-icon">📈</span>
                        <span class="nav-text" data-i18n="nav.budget">Budget</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="networth">
                        <span class="nav-icon">💰</span>
                        <span class="nav-text" data-i18n="nav.networth">Net Worth</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="analytics">
                        <span class="nav-icon">📉</span>
                        <span class="nav-text" data-i18n="nav.analytics">Analytics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="advisor">
                        <span class="nav-icon">🤖</span>
                        <span class="nav-text" data-i18n="nav.advisor">AI Advisor</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="receipt">
                        <span class="nav-icon">📸</span>
                        <span class="nav-text" data-i18n="nav.receipt">Receipt Scanner</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="settings">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text" data-i18n="nav.settings">Settings</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="main-content" id="mainContent">
            <header class="header">
                <div class="header-left">
                    <button class="btn btn-icon btn-secondary menu-toggle" id="menuToggle">☰</button>

        // NEW: Filter transactions by time period
        function filterTransactionsByTime(transactions) {
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            switch (AppState.timeFilter) {
                case 'today':
                    return transactions.filter(t => {
                        const tDate = new Date(t.date);
                        tDate.setHours(0, 0, 0, 0);
                        return tDate.getTime() === now.getTime();
                    });
                
                case 'week':
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - now.getDay());
                    return transactions.filter(t => {
                        const tDate = new Date(t.date);
                        return tDate >= weekStart;
                    });
                
                case 'month':
                    return transactions.filter(t => {
                        const tDate = new Date(t.date);
                        return tDate.getMonth() === now.getMonth() && 
                               tDate.getFullYear() === now.getFullYear();
                    });
                
                case 'custom':
                    if (!AppState.customDateRange.start || !AppState.customDateRange.end) {
                        return transactions;
                    }
                    return transactions.filter(t => {
                        const tDate = new Date(t.date);
                        const start = new Date(AppState.customDateRange.start);
                        const end = new Date(AppState.customDateRange.end);
                        return tDate >= start && tDate <= end;
                    });
                
                default: // 'all'
                    return transactions;
            }
        }

        // NEW: Set time filter
        function setTimeFilter(filter) {
            AppState.timeFilter = filter;
            renderPage();
        }

        // NEW: Update custom date range
        function updateCustomDateRange() {
            const start = document.getElementById('customStartDate')?.value;
            const end = document.getElementById('customEndDate')?.value;
            
            AppState.customDateRange = {
                start: start || null,
                end: end || null
            };
            
            if (AppState.currentPage === 'transactions') {
                updateTransactionList();
            } else {
                renderPage();
            }
        }

        function initApp() {
            loadData();
            setupEventListeners();
            updateCategoryOptions();
            updateWalletOptions();
            renderPage();
        }

        function loadData() {
            AppState.transactions = DataStore.get('transactions', []);
            AppState.wallets = DataStore.get('wallets', []);
            AppState.goals = DataStore.get('goals', []);
            AppState.budget = DataStore.get('budget', null);
            AppState.networth = DataStore.get('networth', { assets: [], liabilities: [] });
            AppState.currentLang = DataStore.get('language', 'en');
            
            // Create default wallet if none exists
            if (AppState.wallets.length === 0) {
                AppState.wallets = [
                    { id: Date.now(), name: 'Cash', type: 'cash', balance: 0 },
                    { id: Date.now() + 1, name: 'Bank Account', type: 'bank', balance: 0 }
                ];
                DataStore.set('wallets', AppState.wallets);
            }
            
            const theme = DataStore.get('theme', 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
            applyTranslations(AppState.currentLang);

            document.querySelectorAll('.nav-link').forEach(link => {

                    e.preventDefault();

                });
            });

                document.getElementById('sidebar').classList.toggle('active');
            });

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('langToggle').addEventListener('click', toggleLanguage);

            document.getElementById('addTransactionBtn').addEventListener('click', () => {
                openModal('transactionModal');
                document.getElementById('transactionForm').reset();
                document.getElementById('transactionId').value = '';
                document.getElementById('transactionDate').value = new Date().toISOString().split('T')[0];
            });

            document.getElementById('transactionForm').addEventListener('submit', handleTransactionSubmit);
            document.getElementById('transactionType').addEventListener('change', updateCategoryOptions);
            document.getElementById('walletForm').addEventListener('submit', handleWalletSubmit);
            document.getElementById('goalForm').addEventListener('submit', handleGoalSubmit);
        }

        function navigateTo(page) {
            AppState.currentPage = page;
            
            // Set default filter based on page
            if (page === 'dashboard') {
                AppState.timeFilter = 'month';
            } else if (page === 'transactions') {
                AppState.timeFilter = 'all';
            }
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });

            const titleKey = `page.${page}`;
            const title = translations[AppState.currentLang].page[page] || page;
            document.getElementById('pageTitle').textContent = title;

            renderPage();

            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

            const content = document.getElementById('pageContent');
            
            switch (AppState.currentPage) {
                case 'dashboard':

                case 'transactions':

                    setupTransactionListeners();
                    break;

                    setupWalletListeners();
                    break;
                case 'goals':

                    setupGoalListeners();
                    break;

                    break;

                    setupNetWorthListeners();
                    break;
                case 'analytics':

                    renderAnalyticsCharts();

        // DASHBOARD with time filters

                income: filteredTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0),
                expenses: filteredTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0),
            };
            filteredStats.balance = filteredStats.income - filteredStats.expenses;

            const recentTransactions = filteredTransactions
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 5);

            const filterLabels = translations[AppState.currentLang].filter;

            return `
                <!-- Time Filter Pills -->
                <div class="filter-pills">

                        ${filterLabels.week}
                    </button>
                    <button class="filter-pill ${AppState.timeFilter === 'month' ? 'active' : ''}" onclick="setTimeFilter('month')">
                        ${filterLabels.month}
                    </button>

                        <div class="stat-change ${stats.balanceChange >= 0 ? 'positive' : 'negative'}">
                            ${stats.balanceChange >= 0 ? '↑' : '↓'} ${Math.abs(stats.balanceChange).toFixed(1)}% from last month
                        </div>
                    </div>
                    
                    <div class="card stat-card">
                        <div class="stat-label">Income (${filterLabels[AppState.timeFilter]})</div>
                        <div class="stat-value" style="color: var(--success)">${formatCurrency(filteredStats.income)}</div>
                        <div class="stat-change positive">${filteredTransactions.filter(t => t.type === 'income').length} transactions</div>

                        <div class="stat-label">Net (${filterLabels[AppState.timeFilter]})</div>

        function updateTransactionList() {
            const search = document.getElementById('searchTransactions')?.value.toLowerCase() || '';
            const type = document.getElementById('filterType')?.value || '';
            const category = document.getElementById('filterCategory')?.value || '';

            let transactions = filterTransactionsByTime(AppState.transactions);

            transactions = transactions.filter(t => {
                const matchSearch = !search || t.description?.toLowerCase().includes(search);
                const matchType = !type || t.type === type;
                const matchCategory = !category || t.category === category;
                return matchSearch && matchType && matchCategory;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

            const summaryEl = document.getElementById('transactionSummary');
            if (summaryEl) {
                summaryEl.innerHTML = `
                    <div class="summary-box">
                        <div class="summary-item">
                            <div class="summary-label">Transactions</div>
                            <div class="summary-value">${transactions.length}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Income</div>
                            <div class="summary-value income">+${formatCurrency(income)}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Expenses</div>
                            <div class="summary-value expense">-${formatCurrency(expenses)}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Net</div>
                            <div class="summary-value" style="color: ${income - expenses >= 0 ? 'var(--success)' : 'var(--danger)'}">
                                ${formatCurrency(income - expenses)}
                            </div>
                        </div>
                    </div>
                `;
            }

            const listEl = document.getElementById('transactionList');
            if (listEl) {
                listEl.innerHTML = transactions.length > 0 ?
                    transactions.map(t => renderTransactionItem(t, true)).join('') :
                    '<div class="empty-state">No transactions found</div>';
            }
        }

        function generateAIInsights() {
            const stats = calculateStats();
            const insights = [];
            const thisMonth = getThisMonthTransactions();
            const lastMonth = getLastMonthTransactions();

            const thisMonthExpense = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const lastMonthExpense = lastMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const expenseChange = lastMonthExpense > 0 ? ((thisMonthExpense - lastMonthExpense) / lastMonthExpense * 100) : 0;

            if (expenseChange > 10) {
                insights.push({
                    icon: '📈',
                    text: `Your spending increased by ${expenseChange.toFixed(1)}% compared to last month. Consider reviewing your expenses.`
                });
            } else if (expenseChange < -10) {
                insights.push({
                    icon: '📉',
                    text: `Great! Your spending decreased by ${Math.abs(expenseChange).toFixed(1)}% compared to last month.`
                });
            }

            const nearGoals = AppState.goals.filter(g => (g.current / g.target) >= 0.8);
            if (nearGoals.length > 0) {
                insights.push({
                    icon: '🎯',
                    text: `You're close to reaching ${nearGoals.length} goal${nearGoals.length > 1 ? 's' : ''}! Keep it up!`
                });
            }

            if (stats.savingsRate < 10) {
                insights.push({
                    icon: '⚠️',
                    text: 'Your savings rate is low. Try to save at least 20% of your income.'
                });
            } else if (stats.savingsRate >= 30) {
                insights.push({
                    icon: '🌟',
                    text: 'Excellent savings rate! You\'re on track to financial freedom.'
                });
            }

            const topCategory = getTopSpendingCategory();
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            if (topCategory && topCategory.amount > income * 0.3) {
                insights.push({
                    icon: '💳',
                    text: `You're spending a lot on ${topCategory.name}. Consider setting a budget limit.`
                });
            }

            const totalBalance = AppState.wallets.reduce((sum, w) => sum + w.balance, 0);
            const monthlyExpense = thisMonthExpense;
            const emergencyMonths = monthlyExpense > 0 ? totalBalance / monthlyExpense : 0;

            if (emergencyMonths < 3 && monthlyExpense > 0) {
                insights.push({
                    icon: '🚨',
                    text: `Your emergency fund covers only ${emergencyMonths.toFixed(1)} months of expenses. Aim for 3-6 months.`
                });
            } else if (emergencyMonths >= 6) {
                insights.push({
                    icon: '🛡️',
                    text: 'Great! You have a solid emergency fund covering ' + emergencyMonths.toFixed(1) + ' months of expenses.'
                });
            }

            return insights.length > 0 ? insights : [
                { icon: '👋', text: 'Start tracking your transactions to get personalized insights!' }
            ];
        }

        // Helper Functions
        function calculateStats() {
            const thisMonth = getThisMonthTransactions();
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = AppState.wallets.reduce((sum, w) => sum + w.balance, 0);

            return {
                totalBalance: balance,
                totalIncome: income,
                totalExpenses: expenses,
                savingsRate: income > 0 ? ((income - expenses) / income) * 100 : 0,
                balanceChange: Math.random() * 20 - 10
            };
        }

        function calculateHealthScore() {
            const stats = calculateStats();
            let score = 50;

            if (stats.savingsRate >= 20) score += 30;
            else if (stats.savingsRate >= 10) score += 15;

            if (stats.totalExpenses < stats.totalIncome * 0.7) score += 20;
            else if (stats.totalExpenses < stats.totalIncome * 0.9) score += 10;

            const monthlyExpense = stats.totalExpenses;
            const emergencyMonths = monthlyExpense > 0 ? stats.totalBalance / monthlyExpense : 0;
            if (emergencyMonths >= 6) score += 20;
            else if (emergencyMonths >= 3) score += 10;

            score = Math.min(Math.max(score, 0), 100);

            let status, label, color, message;
            if (score >= 70) {
                status = 'healthy';
                label = 'Healthy';
                color = '#10b981';
                message = 'Your finances are in great shape! Keep up the good work.';
            } else if (score >= 40) {
                status = 'moderate';
                label = 'Moderate';
                color = '#f59e0b';
                message = 'Your finances are okay, but there\'s room for improvement.';
            } else {
                status = 'poor';
                label = 'Needs Attention';
                color = '#ef4444';
                message = 'Your finances need attention. Consider reviewing your budget.';
            }

            return { score, status, label, color, message };
        }

        function getThisMonthTransactions() {
            const now = new Date();
            return AppState.transactions.filter(t => {
                const tDate = new Date(t.date);
                return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
            });
        }

        function getLastMonthTransactions() {
            const now = new Date();
            const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1);
            return AppState.transactions.filter(t => {
                const tDate = new Date(t.date);
                return tDate.getMonth() === lastMonth.getMonth() && tDate.getFullYear() === lastMonth.getFullYear();
            });
        }

        function getLast6Months() {
            const months = [];
            const now = new Date();
            for (let i = 5; i >= 0; i--) {
                const date = new Date(now.getFullYear(), now.getMonth() - i);
                months.push({
                    month: date.getMonth(),
                    year: date.getFullYear(),
                    label: date.toLocaleDateString('en-US', { month: 'short' })
                });
            }
            return months;
        }

        function getTopSpendingCategory() {
            const expenses = getThisMonthTransactions().filter(t => t.type === 'expense');
            const byCategory = {};
            expenses.forEach(t => {
                byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
            });

            const sorted = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
            if (sorted.length === 0) return null;

            const catId = sorted[0][0];
            const cat = [...CATEGORIES.income, ...CATEGORIES.expense].find(c => c.id === catId);
            
            return {
                name: cat?.name[AppState.currentLang] || catId,
                amount: sorted[0][1]
            };
        }

                        AppState.transactions = data.transactions || [];
                        AppState.wallets = data.wallets || [];
                        AppState.goals = data.goals || [];
                        AppState.budget = data.budget || null;
                        AppState.networth = data.networth || { assets: [], liabilities: [] };

                        DataStore.set('transactions', AppState.transactions);
                        DataStore.set('wallets', AppState.wallets);
                        DataStore.set('goals', AppState.goals);
                        DataStore.set('budget', AppState.budget);

        function renderDashboardCharts() {

                    const data = months.map(month => {

        // Simple Chart Library
        class SimpleBarChart {
            constructor(canvas, options) {
                if (!canvas || !canvas.getContext) return;
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.options = options;
                this.render();
            }

            render() {
                try {
                    const { labels, datasets } = this.options;
                    const width = this.canvas.offsetWidth || 600;
                    const height = 300;
                    this.canvas.width = width;
                    this.canvas.height = height;

                    const padding = 40;
                    const chartWidth = width - padding * 2;
                    const chartHeight = height - padding * 2;

                    const maxValue = Math.max(...datasets.flatMap(d => d.data), 1);
                    const barWidth = chartWidth / labels.length / datasets.length - 10;

                    datasets.forEach((dataset, dsIndex) => {
                        dataset.data.forEach((value, i) => {
                            const barHeight = (value / maxValue) * chartHeight;
                            const x = padding + i * (chartWidth / labels.length) + dsIndex * barWidth + 5;
                            const y = height - padding - barHeight;

                            this.ctx.fillStyle = dataset.color;
                            this.ctx.fillRect(x, y, barWidth, barHeight);
                        });
                    });

                    this.ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') || '#6b7280';
                    this.ctx.font = '12px sans-serif';
                    this.ctx.textAlign = 'center';
                    labels.forEach((label, i) => {
                        const x = padding + i * (chartWidth / labels.length) + chartWidth / labels.length / 2;
                        this.ctx.fillText(label, x, height - 10);
                    });
                } catch (error) {
                    console.error('Bar chart render error:', error);
                }
            }
        }

        class SimpleLineChart {
            constructor(canvas, options) {
                if (!canvas || !canvas.getContext) return;
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.options = options;
                this.render();
            }

            render() {
                try {
                    const { labels, data, color } = this.options;
                    const width = this.canvas.offsetWidth || 600;
                    const height = 300;
                    this.canvas.width = width;
                    this.canvas.height = height;

                    const padding = 40;
                    const chartWidth = width - padding * 2;
                    const chartHeight = height - padding * 2;

                    const maxValue = Math.max(...data, 1);
                    const stepX = chartWidth / (data.length - 1 || 1);

                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();

                    data.forEach((value, i) => {
                        const x = padding + i * stepX;
                        const y = height - padding - (value / maxValue) * chartHeight;
                        if (i === 0) this.ctx.moveTo(x, y);
                        else this.ctx.lineTo(x, y);
                    });

                    this.ctx.stroke();

                    data.forEach((value, i) => {
                        const x = padding + i * stepX;
                        const y = height - padding - (value / maxValue) * chartHeight;
                        this.ctx.fillStyle = color;
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, 5, 0, Math.PI * 2);
                        this.ctx.fill();
                    });

                    this.ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') || '#6b7280';
                    this.ctx.font = '12px sans-serif';
                    this.ctx.textAlign = 'center';
                    labels.forEach((label, i) => {
                        const x = padding + i * stepX;
                        this.ctx.fillText(label, x, height - 10);
                    });
                } catch (error) {
                    console.error('Line chart render error:', error);
                }
            }
        }

        class SimplePieChart {
            constructor(canvas, options) {
                if (!canvas || !canvas.getContext) return;
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.options = options;
                this.render();
            }

            render() {
                try {
                    const { labels, data, colors } = this.options;
                    const width = this.canvas.offsetWidth || 600;
                    const height = 300;
                    this.canvas.width = width;
                    this.canvas.height = height;

                    const centerX = width / 2;
                    const centerY = height / 2;
                    const radius = Math.min(width, height) / 3;

                    const total = data.reduce((sum, val) => sum + val, 0) || 1;
                    let currentAngle = -Math.PI / 2;

                    data.forEach((value, i) => {
                        const sliceAngle = (value / total) * Math.PI * 2;
                        
                        this.ctx.fillStyle = colors[i % colors.length];
                        this.ctx.beginPath();
                        this.ctx.moveTo(centerX, centerY);
                        this.ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
                        this.ctx.closePath();
                        this.ctx.fill();

                        currentAngle += sliceAngle;
                    });

                    const legendY = height - 60;
                    labels.forEach((label, i) => {
                        const x = 20 + (i % 3) * (width / 3);
                        const y = legendY + Math.floor(i / 3) * 20;

                        this.ctx.fillStyle = colors[i % colors.length];
                        this.ctx.fillRect(x, y, 15, 15);

                        this.ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary') || '#111827';
                        this.ctx.font = '12px sans-serif';
                        this.ctx.textAlign = 'left';
                        this.ctx.fillText(label, x + 20, y + 12);
                    });
                } catch (error) {
                    console.error('Pie chart render error:', error);
                }
            }
        }

        window.addEventListener('load', () => {
            if (!AppState.transactions) {
                initApp();
            }
        });
    </script>
</body>
</html>
