<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | RUMETIQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --deep: #0a0a0f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--deep);
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* Animated Background Elements */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, #1a1a2e 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #071a2b 0%, transparent 40%);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(0, 106, 255, 0.1));
            filter: blur(80px);
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(30%, 20%) scale(1.2); }
        }

        /* Full Screen Layout */
        main {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 40px;
            gap: 40px;
        }

        /* Left Side: Content */
        .content-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
            z-index: 10;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 12px;
            margin-bottom: 80px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            width: fit-content;
            padding: 8px 20px;
            border-radius: 100px;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .desc {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        /* Right Side: Visual & Data */
        .visual-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            width: 100%;
            max-width: 550px;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }

        .big-check {
            width: 120px;
            height: 120px;
            background: var(--accent);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.3);
            transform: rotate(-10deg);
        }

        .transaction-info {
            border-top: 1px solid var(--border);
            padding-top: 30px;
            margin-top: 30px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .label { color: rgba(255,255,255,0.4); }
        .val { font-weight: 600; color: #fff; }

        /* Buttons & Redirect */
        .actions {
            margin-top: 40px;
        }

        .btn-main {
            padding: 20px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 800;
            display: inline-block;
            transition: 0.4s;
            margin-right: 20px;
        }

        .btn-main:hover {
            background: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
        }

        .timer-circle {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #progress {
            color: var(--accent);
            font-weight: 700;
        }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob"></div>
    </div>

    <main>
        <section class="content-section">
            <div class="brand">RUMETIQ</div>
            
            <div class="status-badge">
                <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
                Payment Secured
            </div>

            <h1>Selesai.<br>Semua Beres.</h1>
            
            <p class="desc">
                Pembayaran Anda telah diterima oleh sistem kami. Layanan Anda kini telah aktif dan siap digunakan.
            </p>

            <div class="actions">
                <a href="https://google.com" class="btn-main">MASUK KE DASHBOARD</a>
            </div>
        </section>

        <section class="visual-section">
            <div class="glass-panel">
                <div class="big-check">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>

                <h2 style="font-size: 24px; margin-bottom: 8px;">Detail Transaksi</h2>
                <p style="color: rgba(255,255,255,0.4); font-size: 14px;">Rumetiq Indonesia / Payment Gateway</p>

                <div class="transaction-info">
                    <div class="info-row">
                        <span class="label">Status</span>
                        <span class="val" style="color: var(--accent);">SUCCESS</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Waktu</span>
                        <span class="val" id="time-val"></span>
                    </div>
                    <div class="info-row">
                        <span class="label">Merchant</span>
                        <span class="val">RUMETIQ IDN</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="timer-circle">
        REDIRECTING IN <span id="progress">5</span>s
    </div>

    <script>
        // Update Time
        const updateTime = () => {
            const now = new Date();
            document.getElementById('time-val').innerText = now.toLocaleDateString('id-ID', {
                day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            }) + " WIB";
        }
        updateTime();

        // Countdown
        let count = 5;
        const progress = document.getElementById('progress');
        const interval = setInterval(() => {
            count--;
            progress.innerText = count;
            if(count <= 0) {
                clearInterval(interval);
                window.location.href = "https://google.com";
            }
        }, 1000);
    </script>
</body>
</html>
